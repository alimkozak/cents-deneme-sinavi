<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEnT-S Deneme Sınavı</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        #timer-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #question-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .nav-btn {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #e2e8f0; }
        .nav-btn.answered { background: #10b981; color: white; border-color: #10b981; }
        .nav-btn.active { border: 2px solid var(--primary); box-shadow: 0 0 5px rgba(37,99,235,0.5); }
        
        /* Main Content */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }
        .question-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .category-badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover { background: #f1f5f9; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        /* Actions */
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-nav { background: var(--bg-color); border: 1px solid var(--border); color: var(--text); }
        .btn-submit { background: #ef4444; color: white; }
        
        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .score-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="timer-box">110:00</div>
        <h3>Sorular</h3>
        <div id="question-nav"></div>
    </div>

    <div id="main-content">
        <div id="quiz-screen">
            <div class="question-container">
                <div class="category-badge" id="q-category">Kategori</div>
                <div class="question-text" id="q-text">Soru metni yükleniyor...</div>
                <div class="options" id="q-options">
                    </div>
            </div>
            
            <div class="actions">
                <button class="btn-nav" onclick="prevQuestion()">Önceki Soru</button>
                <button class="btn-submit" onclick="finishExam()">Sınavı Bitir</button>
                <button class="btn-nav" onclick="nextQuestion()">Sonraki Soru</button>
            </div>
        </div>

        <div id="results-screen">
            <div class="score-box">
                <h2>Sınav Tamamlandı!</h2>
                <h1 style="font-size: 4rem; color: var(--primary);" id="final-score">0.00</h1>
                <p>Net Puan (Doğru: +1, Yanlış: -0.25)</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-around; font-size: 1.1rem;">
                    <div style="color: #10b981;">Doğru: <span id="res-correct">0</span></div>
                    <div style="color: #ef4444;">Yanlış: <span id="res-wrong">0</span></div>
                    <div style="color: #64748b;">Boş: <span id="res-empty">0</span></div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Soru Bankası (55 soruya tamamlamak için bu diziyi genişletebilirsin)
    const questions = [
        { category: "Mathematics", text: "What is the inverse function f^-1(x) of f(x) = (3x - 1) / (x + 2)?", options: ["(-2x - 1) / (x - 3)", "(2x + 1) / (x - 3)", "(x + 2) / (3x - 1)", "(-2x + 1) / (x + 3)"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the positive integer x that satisfies the equation log2(x - 2) + log2(x + 2) = 5?", options: ["4", "6", "8", "36"], correctIndex: 1 },
        { category: "Mathematics", text: "A bag contains 4 red, 5 white, and 3 blue balls. If 2 balls are drawn at random, what is the probability that both are white?", options: ["5/33", "5/12", "25/144", "10/33"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the value of the limit lim (x -> 3) (x^2 - 9) / (x - 3)?", options: ["0", "3", "6", "Does not exist"], correctIndex: 2 },
        { category: "Mathematics", text: "If the polynomial P(x) = x^3 - 2x^2 + ax + b is perfectly divisible by (x - 1) and (x + 2), what is the sum of a + b?", options: ["-1", "0", "1", "2"], correctIndex: 2 },
        { category: "Mathematics", text: "What is the slope of the line passing through points A(-1, 2) and B(3, 4) in the analytic plane?", options: ["1/2", "2", "-1/2", "-2"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the sum of the coordinates of the vertex of the parabola f(x) = x^2 - 4x + 5?", options: ["1", "2", "3", "4"], correctIndex: 2 },
        { category: "Mathematics", text: "For the equation x^2 - 5x + 6 = 0 with roots x1 and x2, what is the value of (1/x1) + (1/x2)?", options: ["5/6", "6/5", "-5/6", "5"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the result of sin(30°) + cos(60°)?", options: ["1/2", "1", "sqrt(3)/2", "sqrt(3)"], correctIndex: 1 },
        { category: "Mathematics", text: "How many 3-element subsets of the set A = {1, 2, 3, 4, 5} contain the element '2'?", options: ["4", "6", "10", "12"], correctIndex: 1 },
        { category: "Mathematics", text: "Given x^2 - y^2 = 24 and x - y = 4, what is the product x * y?", options: ["5", "8", "12", "20"], correctIndex: 0 },
        { category: "Mathematics", text: "The price of a product is first increased by 20%. Then, a 20% discount is applied to the new price. What is the final change in the product's price?", options: ["No change", "Increases by 4%", "Decreases by 4%", "Decreases by 10%"], correctIndex: 2 },
        { category: "Mathematics", text: "What is the modulus (distance to the origin) of the complex number z = 3 - 4i?", options: ["1", "5", "7", "25"], correctIndex: 1 },
        { category: "Mathematics", text: "What is the value of x that satisfies the equation 2^(x+1) = 16^(x-2)?", options: ["2", "3", "4", "5"], correctIndex: 1 },
        { category: "Mathematics", text: "What is the sum of the integer values of x that satisfy the inequality |2x - 3| < 7?", options: ["5", "7", "9", "12"], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "All As are Bs. No B is C. Based on these premises, which of the following is absolutely true?", options: ["Some Cs are As.", "No A is C.", "All Bs are As.", "Some As are Cs."], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "If it rains, the ground gets wet. The ground is not wet. Therefore:", options: ["It has rained.", "It has not rained.", "The sun is shining.", "No conclusion can be drawn."], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "2, 6, 12, 20, 30, ? Which number should replace the question mark in the sequence?", options: ["38", "40", "42", "44"], correctIndex: 2 },
        { category: "Logic and Reading Comprehension", text: "Ali is taller than Burak; Can is shorter than Ali. Who is the shortest?", options: ["Ali", "Burak", "Can", "Could be Burak or Can"], correctIndex: 3 },
        { category: "Logic and Reading Comprehension", text: "In a coding system, if the word 'ELMA' is written as 'FNNB', how is the word 'KEDİ' written?", options: ["LFEJ", "LFJE", "MGEJ", "KFEJ"], correctIndex: 0 },
        { category: "Logic and Reading Comprehension", text: "There are 5 players in a chess tournament. Everyone will play exactly one match with each other. How many matches will be played in total?", options: ["10", "15", "20", "25"], correctIndex: 0 },
        { category: "Logic and Reading Comprehension", text: "Which of the following words is semantically different from the others?", options: ["Violin", "Guitar", "Piano", "Flute"], correctIndex: 3 },
        { category: "Logic and Reading Comprehension", text: "If 4 workers can finish a job in 15 days, how many days will it take 6 workers to finish the same job?", options: ["8", "10", "12", "15"], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "If today is Tuesday, what day will it be 100 days from now?", options: ["Monday", "Wednesday", "Thursday", "Friday"], correctIndex: 2 },
        { category: "Logic and Reading Comprehension", text: "In a library, 40% of the books are novels, 30% are poetry, and the rest are history books. If there are 60 history books, how many books are there in total?", options: ["150", "200", "250", "300"], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "Which of the following is logically equivalent to the statement 'If X does not happen, Y does not happen'?", options: ["If Y has happened, X has happened.", "If X happens, Y definitely happens.", "If Y doesn't happen, X doesn't happen.", "X and Y are not connected."], correctIndex: 0 },
        { category: "Logic and Reading Comprehension", text: "According to what rule are the numbers 1, 4, 9, 16, 25 sequenced?", options: ["Prime numbers", "Fibonacci sequence", "Perfect squares", "Even numbers"], correctIndex: 2 },
        { category: "Logic and Reading Comprehension", text: "When Ahmet was born, Ayşe was 5 years old. What will be the sum of their ages when Ahmet turns 10?", options: ["15", "20", "25", "30"], correctIndex: 2 },
        { category: "Logic and Reading Comprehension", text: "Which pair has a similar antonymous relationship to 'Forward - Backward'?", options: ["Heavy - Slow", "Fresh - Stale", "Beautiful - Ugly", "Far - Near"], correctIndex: 1 },
        { category: "Logic and Reading Comprehension", text: "A clock loses 5 minutes every 24 hours. If it is set correctly, what time will the broken clock show when the correct time is 12:00 exactly 4 days later?", options: ["11:40", "11:45", "12:15", "12:20"], correctIndex: 0 },{ category: "Physics", text: "A vehicle starting from rest accelerates with a constant acceleration of 2 m/s^2. How many meters will it have traveled after 5 seconds?", options: ["10 m", "20 m", "25 m", "50 m"], correctIndex: 2 },
        { category: "Physics", text: "An object dropped from a height of h hits the ground with a velocity of v. If it were dropped from a height of 4h, what would be its impact velocity? (Air resistance is negligible)", options: ["v", "2v", "4v", "16v"], correctIndex: 1 },
        { category: "Physics", text: "Two conductors with resistances of 4 Ohms and 12 Ohms are connected in parallel. What is the equivalent resistance of the system in Ohms?", options: ["3", "8", "16", "48"], correctIndex: 0 },
        { category: "Physics", text: "The ratio of the net force applied to an object to its acceleration gives which of the following?", options: ["Mass", "Velocity", "Work", "Power"], correctIndex: 0 },
        { category: "Physics", text: "What is the change in direction of light as it passes from one transparent medium to another called?", options: ["Reflection", "Refraction", "Interference", "Diffraction"], correctIndex: 1 },
        { category: "Chemistry", text: "Under standard conditions, what volume does 1 mole of an ideal gas occupy in liters?", options: ["11.2", "22.4", "24.5", "44.8"], correctIndex: 1 },
        { category: "Chemistry", text: "Where is the element Sodium (Na) with atomic number 11 located in the periodic table?", options: ["Period 1, Group 1A", "Period 2, Group 2A", "Period 3, Group 1A", "Period 3, Group 2A"], correctIndex: 2 },
        { category: "Chemistry", text: "Which of the following is true for an aqueous solution with a pH of 3?", options: ["Strong base", "Weak base", "Acidic", "Neutral"], correctIndex: 2 },
        { category: "Chemistry", text: "What is the oxidation state of the Carbon (C) atom in the CO2 molecule? (Oxygen generally takes -2)", options: ["-4", "-2", "+2", "+4"], correctIndex: 3 },
        { category: "Chemistry", text: "What is the number of neutrons in an element with a mass number of 35 and an atomic number of 17?", options: ["17", "18", "35", "52"], correctIndex: 1 },
        { category: "Chemistry", text: "What is the type of bond between the carbon and hydrogen atoms in a methane (CH4) molecule?", options: ["Ionic bond", "Nonpolar covalent bond", "Polar covalent bond", "Hydrogen bond"], correctIndex: 2 },
        { category: "Chemistry", text: "Which of the following is NOT a noble gas?", options: ["Helium", "Neon", "Argon", "Chlorine"], correctIndex: 3 },
        { category: "Chemistry", text: "How many moles of atoms are there in total in 1 mole of H2O molecule?", options: ["1", "2", "3", "6"], correctIndex: 2 },
        { category: "Chemistry", text: "What is the chemical formula of the acid known as hydrochloric acid (spirit of salt)?", options: ["H2SO4", "HNO3", "HCl", "CH3COOH"], correctIndex: 2 },
        { category: "Chemistry", text: "What is the substance that increases the rate of a chemical reaction but is not consumed itself called?", options: ["Reactant", "Catalyst", "Product", "Inhibitor"], correctIndex: 1 },
        { category: "Biology", text: "Which of the following organelles is responsible for energy (ATP) production in the cell?", options: ["Ribosome", "Lysosome", "Mitochondrion", "Golgi apparatus"], correctIndex: 2 },
        { category: "Biology", text: "In which part of the cell does the process of photosynthesis take place in plants?", options: ["Chloroplast", "Chromoplast", "Leucoplast", "Centrosome"], correctIndex: 0 },
        { category: "Biology", text: "Which blood cells are involved in blood clotting in humans?", options: ["Erythrocytes (Red blood cells)", "Leukocytes (White blood cells)", "Thrombocytes (Platelets)", "Neurons"], correctIndex: 2 },
        { category: "Biology", text: "How many daughter cells are produced from a mother cell as a result of mitosis?", options: ["2", "4", "6", "8"], correctIndex: 0 },
        { category: "Biology", text: "Which of the following organic bases found in the structure of DNA is NOT found in RNA?", options: ["Adenine", "Guanine", "Cytosine", "Thymine"], correctIndex: 3 },
        { category: "Biology", text: "Which cells of the pancreas produce the hormone that lowers blood sugar?", options: ["Alpha cells", "Beta cells", "Gastric glands", "Liver cells"], correctIndex: 1 },
        { category: "Biology", text: "How many chambers does the heart of mammals consist of?", options: ["2", "3", "4", "5"], correctIndex: 2 },
        { category: "Biology", text: "Which of the following are the building blocks of proteins?", options: ["Glucose", "Fatty acids", "Amino acids", "Nucleotides"], correctIndex: 2 },
        { category: "Biology", text: "Which of the following diseases is caused by viruses?", options: ["Tuberculosis", "Typhoid", "Flu (Influenza)", "Malaria"], correctIndex: 2 },
        { category: "Biology", text: "According to Mendelian genetics, what is the phenotypic segregation ratio in the offspring resulting from the cross of two heterozygous (Aa) individuals?", options: ["1:1", "3:1", "1:2:1", "9:3:3:1"], correctIndex: 1 }
    ];

    // Toplam Sınav Süresi (Saniye cinsinden: 110 dakika)
    let timeLeft = 110 * 60; 
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timerInterval;

    // Başlangıç Kurulumu
    function init() {
        buildNavigation();
        loadQuestion(0);
        startTimer();
    }

    // Navigasyon Butonlarını Oluştur
    function buildNavigation() {
        const navContainer = document.getElementById('question-nav');
        navContainer.innerHTML = '';
        questions.forEach((q, index) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = index + 1;
            btn.onclick = () => loadQuestion(index);
            btn.id = `nav-btn-${index}`;
            navContainer.appendChild(btn);
        });
    }

    // Soruyu Ekrana Yükle
    function loadQuestion(index) {
        currentQuestionIndex = index;
        const q = questions[index];
        
        document.getElementById('q-category').innerText = q.category;
        document.getElementById('q-text').innerHTML = q.text;
        
        const optionsContainer = document.getElementById('q-options');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'option';
            radio.value = optIndex;
            
            // Eğer daha önce işaretlenmişse seçili getir
            if(userAnswers[index] === optIndex) {
                radio.checked = true;
            }
            
            radio.onchange = () => saveAnswer(optIndex);
            
            label.appendChild(radio);
            const span = document.createElement('span');
            span.innerHTML = opt;
            label.appendChild(span);
            
            optionsContainer.appendChild(label);
        });

        updateNavUI();
        
        // MathJax'i yeni yüklenen soru için tetikle
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    // Cevabı Kaydet ve UI Güncelle
    function saveAnswer(optIndex) {
        userAnswers[currentQuestionIndex] = optIndex;
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('answered');
    }

    function updateNavUI() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('active');
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) loadQuestion(currentQuestionIndex + 1);
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
    }

    // Zamanlayıcı
    function startTimer() {
        const timerBox = document.getElementById('timer-box');
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerBox.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishExam();
            }
        }, 1000);
    }

    // Sınavı Bitir ve Puanı Hesapla
    function finishExam() {
        if(timeLeft > 0 && !confirm("Sınavı bitirmek istediğinize emin misiniz?")) return;
        
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        let correct = 0;
        let wrong = 0;
        let empty = 0;

        userAnswers.forEach((ans, index) => {
            if (ans === null) {
                empty++;
            } else if (ans === questions[index].correctIndex) {
                correct++;
            } else {
                wrong++;
            }
        });

        // CEnT-S Puanlama Sistemi (+1 doğru, -0.25 yanlış)
        let netScore = correct - (wrong * 0.25);

        document.getElementById('final-score').innerText = netScore.toFixed(2);
        document.getElementById('res-correct').innerText = correct;
        document.getElementById('res-wrong').innerText = wrong;
        document.getElementById('res-empty').innerText = empty;
    }

    // Başlat
    window.onload = init;
</script>
</body>

</html>

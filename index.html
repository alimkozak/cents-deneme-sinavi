<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEnT-S Deneme Sınavı</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        #timer-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #question-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .nav-btn {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #e2e8f0; }
        .nav-btn.answered { background: #10b981; color: white; border-color: #10b981; }
        .nav-btn.active { border: 2px solid var(--primary); box-shadow: 0 0 5px rgba(37,99,235,0.5); }
        
        /* Main Content */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }
        .question-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .category-badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover { background: #f1f5f9; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        /* Actions */
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-nav { background: var(--bg-color); border: 1px solid var(--border); color: var(--text); }
        .btn-submit { background: #ef4444; color: white; }
        
        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .score-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="timer-box">110:00</div>
        <h3>Sorular</h3>
        <div id="question-nav"></div>
    </div>

    <div id="main-content">
        <div id="quiz-screen">
            <div class="question-container">
                <div class="category-badge" id="q-category">Kategori</div>
                <div class="question-text" id="q-text">Soru metni yükleniyor...</div>
                <div class="options" id="q-options">
                    </div>
            </div>
            
            <div class="actions">
                <button class="btn-nav" onclick="prevQuestion()">Önceki Soru</button>
                <button class="btn-submit" onclick="finishExam()">Sınavı Bitir</button>
                <button class="btn-nav" onclick="nextQuestion()">Sonraki Soru</button>
            </div>
        </div>

        <div id="results-screen">
            <div class="score-box">
                <h2>Sınav Tamamlandı!</h2>
                <h1 style="font-size: 4rem; color: var(--primary);" id="final-score">0.00</h1>
                <p>Net Puan (Doğru: +1, Yanlış: -0.25)</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-around; font-size: 1.1rem;">
                    <div style="color: #10b981;">Doğru: <span id="res-correct">0</span></div>
                    <div style="color: #ef4444;">Yanlış: <span id="res-wrong">0</span></div>
                    <div style="color: #64748b;">Boş: <span id="res-empty">0</span></div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Soru Bankası (55 soruya tamamlamak için bu diziyi genişletebilirsin)
    const questions = [
        // 1. MATHEMATICS (15 Questions)
        { category: "Mathematics", text: "What is the sum of the roots of the equation $2\\sin^2(x) - 5\\sin(x) + 2 = 0$ in the interval $[0, 2\\pi]$?", options: ["$\\pi$", "$2\\pi$", "$\\pi/2$", "$3\\pi/2$"], correctIndex: 0 },
        { category: "Mathematics", text: "The solution set of the inequality $\\log_2(x^2 - 4x) \\le 5$ is:", options: ["$[-4, 8]$", "$[-4, 0) \\cup (4, 8]$", "$(0, 4)$", "$(-4, 8)$"], correctIndex: 1 },
        { category: "Mathematics", text: "A line $3x + 4y + k = 0$ is tangent to the circle $x^2 + y^2 - 4x + 6y - 12 = 0$. Which of the following is a possible value for $k$?", options: ["$12$", "$19$", "$25$", "$31$"], correctIndex: 3 },
        { category: "Mathematics", text: "Evaluate the limit: $\\lim_{x \\to 0} \\frac{1 - \\cos(2x)}{x\\sin(x)}$", options: ["$0$", "$1$", "$2$", "$\\infty$"], correctIndex: 2 },
        { category: "Mathematics", text: "In a box, there are 7 good microchips and 3 defective ones. If 3 chips are drawn simultaneously, what is the probability that exactly 1 is defective?", options: ["$21/40$", "$7/20$", "$21/120$", "$63/100$"], correctIndex: 0 },
        { category: "Mathematics", text: "Let $z = \\frac{2 + 2i}{1 - i}$. What is the modulus $|z|$?", options: ["$1$", "$\\sqrt{2}$", "$2$", "$4$"], correctIndex: 2 },
        { category: "Mathematics", text: "If $f(x) = e^{2x} \\ln(x)$, what is $f'(1)$?", options: ["$e^2$", "$2e^2$", "$e$", "$0$"], correctIndex: 0 },
        { category: "Mathematics", text: "Find the value of $x$ satisfying $9^x - 4 \\cdot 3^x + 3 = 0$.", options: ["$x=0, x=1$", "$x=1, x=3$", "$x=-1, x=0$", "$x=3$"], correctIndex: 0 },
        { category: "Mathematics", text: "A polynomial $P(x)$ yields a remainder of 3 when divided by $(x-1)$ and a remainder of 7 when divided by $(x+1)$. What is the remainder when $P(x)$ is divided by $(x^2 - 1)$?", options: ["$-2x + 5$", "$2x + 1$", "$5x - 2$", "$4x + 3$"], correctIndex: 0 },
        { category: "Mathematics", text: "The inverse matrix of $A = \\begin{pmatrix} 2 & 5 \\\\ 1 & 3 \\end{pmatrix}$ is:", options: ["$\\begin{pmatrix} 3 & -5 \\\\ -1 & 2 \\end{pmatrix}$", "$\\begin{pmatrix} -3 & 5 \\\\ 1 & -2 \\end{pmatrix}$", "$\\begin{pmatrix} 2 & -1 \\\\ -5 & 3 \\end{pmatrix}$", "$\\begin{pmatrix} 3 & 1 \\\\ 5 & 2 \\end{pmatrix}$"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the area of the region bounded by $y = x^2$ and $y = 2x$?", options: ["$2/3$", "$4/3$", "$2$", "$8/3$"], correctIndex: 1 },
        { category: "Mathematics", text: "How many distinct 4-letter arrangements can be made from the letters of the word 'MISS'?", options: ["$4$", "$6$", "$12$", "$24$"], correctIndex: 2 },
        { category: "Mathematics", text: "Which of the following functions is strictly decreasing on its entire domain?", options: ["$y = -x^3$", "$y = e^{-x}$", "Both $y = -x^3$ and $y = e^{-x}$", "$y = \\ln(x)$"], correctIndex: 2 },
        { category: "Mathematics", text: "Solve for $x$: $|x - 2| + |x + 1| = 5$", options: ["$x = 3, -2$", "$x = 2, -3$", "$x = 3$", "$x = 4, -1$"], correctIndex: 0 },
        { category: "Mathematics", text: "What is the infinite sum of the geometric series $1 - 1/3 + 1/9 - 1/27 + \\dots$?", options: ["$3/4$", "$2/3$", "$3/2$", "$1$"], correctIndex: 0 },

        // 2. LOGIC AND READING COMPREHENSION (15 Questions)
        { category: "Logic", text: "In a class of 100 students, 70 study Math, 80 study Physics, 85 study Chemistry, and 90 study Biology. What is the minimum possible number of students who study all four subjects?", options: ["$10$", "$15$", "$25$", "$70$"], correctIndex: 2 },
        { category: "Logic", text: "Premise 1: All developers love coffee.<br>Premise 2: Some musicians are developers.<br>Conclusion: Therefore, ____.", options: ["All musicians love coffee.", "Some musicians love coffee.", "No developers are musicians.", "Coffee lovers are musicians."], correctIndex: 1 },
        { category: "Logic", text: "Five friends (A, B, C, D, E) sit in a row. C is directly between A and E. B is to the immediate right of E. Who is sitting in the middle if A is at the far left?", options: ["C", "E", "B", "D"], correctIndex: 0 },
        { category: "Logic", text: "If $X \\implies Y$ and $\\neg Y \\implies Z$, which of the following is logically equivalent to $\\neg Z$?", options: ["$\\neg X \\land Y$", "$Y$", "$\\neg X$", "$X$"], correctIndex: 1 },
        { category: "Logic", text: "A password consists of 3 digits. The product of the digits is 36, and their sum is 10. The digits are in ascending order. What is the password?", options: ["$229$", "$149$", "$236$", "$334$"], correctIndex: 2 },
        { category: "Logic", text: "A tank has two pipes. Pipe A fills it in 4 hours. Pipe B empties it in 6 hours. If both are opened simultaneously, how long does it take to fill the tank?", options: ["$10$ hours", "$12$ hours", "$2.4$ hours", "$5$ hours"], correctIndex: 1 },
        { category: "Logic", text: "Which number completes the sequence logically? $3, 4, 8, 17, 33, ?$", options: ["$49$", "$58$", "$64$", "$68$"], correctIndex: 1 },
        { category: "Logic", text: "Read the text: 'The advent of AI will not replace engineers but will change their primary tools.' What is the main assumption of this statement?", options: ["AI is a threat to jobs.", "Engineers will adapt to use AI.", "AI can design structures independently.", "Engineering tools have never changed before."], correctIndex: 1 },
        { category: "Logic", text: "If 'TOLC' is coded as 'WROE', how is 'EXAM' coded using the same logic?", options: ["HADP", "HAEP", "HZDP", "IAEQ"], correctIndex: 0 },
        { category: "Logic", text: "X is the father of Y's son. How is X related to Y if Y is male?", options: ["Brother", "Uncle", "Y himself", "Grandfather"], correctIndex: 2 },
        { category: "Logic", text: "There are 12 people at a meeting. If everyone shakes hands with everyone else exactly once, how many handshakes occur?", options: ["$66$", "$132$", "$144$", "$24$"], correctIndex: 0 },
        { category: "Logic", text: "A clock shows 3:15. What is the acute angle between the hour and minute hands?", options: ["$0^\\circ$", "$7.5^\\circ$", "$22.5^\\circ$", "$30^\\circ$"], correctIndex: 1 },
        { category: "Logic", text: "Statement: 'Unless you have a ticket, you cannot enter.' This is logically identical to:", options: ["If you have a ticket, you must enter.", "If you enter, you have a ticket.", "Having a ticket guarantees entry.", "If you don't enter, you don't have a ticket."], correctIndex: 1 },
        { category: "Logic", text: "In a cryptographic system, $A=1, B=3, C=5, D=7$. What is the value of the word 'BACA'?", options: ["$12$", "$10$", "$14$", "$9$"], correctIndex: 1 },
        { category: "Logic", text: "Three machines A, B, and C can print a batch of documents in 2, 3, and 6 hours respectively. Working together, how long will it take them?", options: ["$1$ hour", "$1.5$ hours", "$45$ minutes", "$2$ hours"], correctIndex: 0 },

        // 3. PHYSICS (5 Questions)
        { category: "Physics", text: "A stone is thrown vertically upwards with an initial velocity of $20\\ m/s$ from the roof of a $25\\ m$ tall building. How long does it take for the stone to hit the ground? (Assume $g = 10\\ m/s^2$ and negligible air resistance).", options: ["$2\\ s$", "$3\\ s$", "$4\\ s$", "$5\\ s$"], correctIndex: 3 },
        { category: "Physics", text: "A block of mass $m$ slides down a rough inclined plane of angle $\\theta$ at a constant velocity. What is the coefficient of kinetic friction $\\mu_k$?", options: ["$\\sin(\\theta)$", "$\\cos(\\theta)$", "$\\tan(\\theta)$", "$\\cot(\\theta)$"], correctIndex: 2 },
        { category: "Physics", text: "$100\\ g$ of ice at $0^\\circ C$ is mixed with $100\\ g$ of water at $80^\\circ C$ in a thermally insulated container. Assuming the latent heat of fusion of ice is $80\\ cal/g$ and the specific heat of water is $1\\ cal/g^\\circ C$, what is the final equilibrium temperature?", options: ["$0^\\circ C$", "$20^\\circ C$", "$40^\\circ C$", "$10^\\circ C$"], correctIndex: 0 },
        { category: "Physics", text: "In a DC circuit, a battery with an EMF of $12\\ V$ and internal resistance of $1\\ \\Omega$ is connected to a load resistor of $5\\ \\Omega$. What is the terminal voltage across the battery while operating?", options: ["$12\\ V$", "$10\\ V$", "$2\\ V$", "$8\\ V$"], correctIndex: 1 },
        { category: "Physics", text: "An ideal gas undergoes an isothermal expansion, doubling its volume. Which of the following statements is true?", options: ["Its internal energy increases.", "The work done by the gas is zero.", "The heat added to the gas equals the work done by it.", "Its pressure doubles."], correctIndex: 2 },

        // 4. CHEMISTRY (10 Questions)
        { category: "Chemistry", text: "In the reaction $2H_2(g) + O_2(g) \\to 2H_2O(g)$, $4.0\\ g$ of $H_2$ reacts with $16.0\\ g$ of $O_2$. What is the limiting reactant and how many moles of $H_2O$ are formed? ($H=1, O=16$)", options: ["$H_2$, 2 moles", "$O_2$, 1 mole", "$H_2$, 1 mole", "$O_2$, 2 moles"], correctIndex: 1 },
        { category: "Chemistry", text: "Which of the following electron configurations represents a transition metal in its ground state?", options: ["$[Ar] 4s^2 3d^{10} 4p^1$", "$[Ar] 4s^2 3d^5$", "$[Ne] 3s^2 3p^6$", "$[Kr] 5s^1$"], correctIndex: 1 },
        { category: "Chemistry", text: "What is the pH of a $0.01\\ M$ solution of a weak acid $HA$ with $K_a = 1.0 \\times 10^{-6}$?", options: ["$2$", "$4$", "$6$", "$8$"], correctIndex: 1 },
        { category: "Chemistry", text: "Consider the equilibrium: $N_2(g) + 3H_2(g) \\rightleftharpoons 2NH_3(g) \\ \\ \\Delta H < 0$. Which change will shift the equilibrium to the right?", options: ["Increasing temperature", "Decreasing pressure", "Adding a catalyst", "Increasing the pressure"], correctIndex: 3 },
        { category: "Chemistry", text: "What is the hybridization of the central Carbon atom in the ethene ($C_2H_4$) molecule?", options: ["$sp$", "$sp^2$", "$sp^3$", "$sp^3d$"], correctIndex: 1 },
        { category: "Chemistry", text: "In a galvanic cell consisting of $Zn/Zn^{2+}$ ($E^\\circ = -0.76\\ V$) and $Cu/Cu^{2+}$ ($E^\\circ = +0.34\\ V$) half-cells, what is the standard cell potential?", options: ["$1.10\\ V$", "$-0.42\\ V$", "$0.42\\ V$", "$-1.10\\ V$"], correctIndex: 0 },
        { category: "Chemistry", text: "Which intermolecular force is primarily responsible for the relatively high boiling point of water ($H_2O$) compared to hydrogen sulfide ($H_2S$)?", options: ["London dispersion forces", "Dipole-dipole interactions", "Hydrogen bonding", "Ion-dipole forces"], correctIndex: 2 },
        { category: "Chemistry", text: "According to the kinetic molecular theory, if the absolute temperature of an ideal gas is quadrupled, the root-mean-square (rms) speed of its molecules will:", options: ["Double", "Quadruple", "Halve", "Remain the same"], correctIndex: 0 },
        { category: "Chemistry", text: "Which of the following compounds exhibits geometric (cis-trans) isomerism?", options: ["1-butene", "2-butene", "Propene", "Ethyne"], correctIndex: 1 },
        { category: "Chemistry", text: "What is the oxidation number of Chromium (Cr) in the dichromate ion ($Cr_2O_7^{2-}$)?", options: ["$+3$", "$+6$", "$+7$", "$+12$"], correctIndex: 1 },

        // 5. BIOLOGY (10 Questions)
        { category: "Biology", text: "A woman who is a carrier for X-linked color blindness marries a man with normal color vision. What is the probability that their son will be color blind?", options: ["$0\\%$", "$25\\%$", "$50\\%$", "$100\\%$"], correctIndex: 2 },
        { category: "Biology", text: "During which specific stage of cellular respiration is the majority of ATP produced?", options: ["Glycolysis", "Krebs Cycle", "Oxidative Phosphorylation (ETC)", "Fermentation"], correctIndex: 2 },
        { category: "Biology", text: "Which enzyme is responsible for breaking the hydrogen bonds between nitrogenous bases to 'unzip' the DNA double helix during replication?", options: ["DNA Polymerase", "Helicase", "Ligase", "Primase"], correctIndex: 1 },
        { category: "Biology", text: "In a resting neuron, the sodium-potassium pump ($Na^+/K^+$ pump) maintains the resting membrane potential by:", options: ["Moving 3 $Na^+$ out and 2 $K^+$ in.", "Moving 2 $Na^+$ out and 3 $K^+$ in.", "Moving 3 $Na^+$ in and 2 $K^+$ out.", "Allowing passive diffusion of $Na^+$."], correctIndex: 0 },
        { category: "Biology", text: "Which of the following is an example of negative feedback in the endocrine system?", options: ["Oxytocin release during childbirth.", "Blood clotting cascade.", "High levels of thyroxine ($T_4$) inhibiting TSH release.", "Estrogen surge prior to ovulation."], correctIndex: 2 },
        { category: "Biology", text: "Which plant tissue is primarily responsible for the active transport of sugars from the leaves to the roots?", options: ["Xylem", "Phloem", "Epidermis", "Cambium"], correctIndex: 1 },
        { category: "Biology", text: "Competitive inhibitors affect enzyme activity by:", options: ["Binding to the allosteric site and changing the enzyme's shape.", "Denaturing the enzyme structure permanently.", "Binding to the active site, mimicking the substrate.", "Decreasing the surrounding pH level."], correctIndex: 2 },
        { category: "Biology", text: "The Bohr effect explains how oxygen is released to metabolically active tissues. Which conditions decrease the affinity of hemoglobin for oxygen?", options: ["Low $CO_2$ and High pH", "High $CO_2$ and Low pH", "Low Temperature", "High $O_2$ partial pressure"], correctIndex: 1 },
        { category: "Biology", text: "In a population in Hardy-Weinberg equilibrium, the frequency of the recessive allele ($q$) is $0.4$. What percentage of the population is heterozygous ($2pq$)?", options: ["$16\\%$", "$36\\%$", "$48\\%$", "$84\\%$"], correctIndex: 2 },
        { category: "Biology", text: "Crossing over, which increases genetic diversity, occurs during which phase of cell division?", options: ["Prophase I of Meiosis", "Metaphase II of Meiosis", "Prophase of Mitosis", "Anaphase I of Meiosis"], correctIndex: 0 }
    ];

    // Toplam Sınav Süresi (Saniye cinsinden: 110 dakika)
    let timeLeft = 110 * 60; 
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timerInterval;

    // Başlangıç Kurulumu
    function init() {
        buildNavigation();
        loadQuestion(0);
        startTimer();
    }

    // Navigasyon Butonlarını Oluştur
    function buildNavigation() {
        const navContainer = document.getElementById('question-nav');
        navContainer.innerHTML = '';
        questions.forEach((q, index) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = index + 1;
            btn.onclick = () => loadQuestion(index);
            btn.id = `nav-btn-${index}`;
            navContainer.appendChild(btn);
        });
    }

    // Soruyu Ekrana Yükle
    function loadQuestion(index) {
        currentQuestionIndex = index;
        const q = questions[index];
        
        document.getElementById('q-category').innerText = q.category;
        document.getElementById('q-text').innerHTML = q.text;
        
        const optionsContainer = document.getElementById('q-options');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'option';
            radio.value = optIndex;
            
            // Eğer daha önce işaretlenmişse seçili getir
            if(userAnswers[index] === optIndex) {
                radio.checked = true;
            }
            
            radio.onchange = () => saveAnswer(optIndex);
            
            label.appendChild(radio);
            const span = document.createElement('span');
            span.innerHTML = opt;
            label.appendChild(span);
            
            optionsContainer.appendChild(label);
        });

        updateNavUI();
        
        // MathJax'i yeni yüklenen soru için tetikle
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    // Cevabı Kaydet ve UI Güncelle
    function saveAnswer(optIndex) {
        userAnswers[currentQuestionIndex] = optIndex;
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('answered');
    }

    function updateNavUI() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('active');
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) loadQuestion(currentQuestionIndex + 1);
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
    }

    // Zamanlayıcı
    function startTimer() {
        const timerBox = document.getElementById('timer-box');
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerBox.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishExam();
            }
        }, 1000);
    }

    // Sınavı Bitir ve Puanı Hesapla
    function finishExam() {
        if(timeLeft > 0 && !confirm("Sınavı bitirmek istediğinize emin misiniz?")) return;
        
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        let correct = 0;
        let wrong = 0;
        let empty = 0;

        userAnswers.forEach((ans, index) => {
            if (ans === null) {
                empty++;
            } else if (ans === questions[index].correctIndex) {
                correct++;
            } else {
                wrong++;
            }
        });

        // CEnT-S Puanlama Sistemi (+1 doğru, -0.25 yanlış)
        let netScore = correct - (wrong * 0.25);

        document.getElementById('final-score').innerText = netScore.toFixed(2);
        document.getElementById('res-correct').innerText = correct;
        document.getElementById('res-wrong').innerText = wrong;
        document.getElementById('res-empty').innerText = empty;
    }

    // Başlat
    window.onload = init;
</script>
</body>

</html>

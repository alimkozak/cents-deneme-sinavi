<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEnT-S Deneme Sınavı</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        #timer-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #question-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .nav-btn {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #e2e8f0; }
        .nav-btn.answered { background: #10b981; color: white; border-color: #10b981; }
        .nav-btn.active { border: 2px solid var(--primary); box-shadow: 0 0 5px rgba(37,99,235,0.5); }
        
        /* Main Content */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }
        .question-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .category-badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover { background: #f1f5f9; }
        .option-label input { margin-right: 15px; transform: scale(1.2); }
        
        /* Actions */
        .actions {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-nav { background: var(--bg-color); border: 1px solid var(--border); color: var(--text); }
        .btn-submit { background: #ef4444; color: white; }
        
        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .score-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="timer-box">110:00</div>
        <h3>Sorular</h3>
        <div id="question-nav"></div>
    </div>

    <div id="main-content">
        <div id="quiz-screen">
            <div class="question-container">
                <div class="category-badge" id="q-category">Kategori</div>
                <div class="question-text" id="q-text">Soru metni yükleniyor...</div>
                <div class="options" id="q-options">
                    </div>
            </div>
            
            <div class="actions">
                <button class="btn-nav" onclick="prevQuestion()">Önceki Soru</button>
                <button class="btn-submit" onclick="finishExam()">Sınavı Bitir</button>
                <button class="btn-nav" onclick="nextQuestion()">Sonraki Soru</button>
            </div>
        </div>

        <div id="results-screen">
            <div class="score-box">
                <h2>Sınav Tamamlandı!</h2>
                <h1 style="font-size: 4rem; color: var(--primary);" id="final-score">0.00</h1>
                <p>Net Puan (Doğru: +1, Yanlış: -0.25)</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-around; font-size: 1.1rem;">
                    <div style="color: #10b981;">Doğru: <span id="res-correct">0</span></div>
                    <div style="color: #ef4444;">Yanlış: <span id="res-wrong">0</span></div>
                    <div style="color: #64748b;">Boş: <span id="res-empty">0</span></div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Soru Bankası (55 soruya tamamlamak için bu diziyi genişletebilirsin)
    const questions = [
        { category: "Matematik", text: "f(x) = (3x - 1) / (x + 2) fonksiyonunun tersi olan f^-1(x) aşağıdakilerden hangisidir?", options: ["(-2x - 1) / (x - 3)", "(2x + 1) / (x - 3)", "(x + 2) / (3x - 1)", "(-2x + 1) / (x + 3)"], correctIndex: 0 },
        { category: "Matematik", text: "log2(x - 2) + log2(x + 2) = 5 denklemini sağlayan x pozitif tam sayısı kaçtır?", options: ["4", "6", "8", "36"], correctIndex: 1 },
        { category: "Matematik", text: "Bir torbada 4 kırmızı, 5 beyaz ve 3 mavi top vardır. Torbadan rastgele çekilen 2 topun ikisinin de beyaz olma olasılığı kaçtır?", options: ["5/33", "5/12", "25/144", "10/33"], correctIndex: 0 },
        { category: "Matematik", text: "lim (x -> 3) (x^2 - 9) / (x - 3) limitinin değeri kaçtır?", options: ["0", "3", "6", "Limit yoktur"], correctIndex: 2 },
        { category: "Matematik", text: "P(x) = x^3 - 2x^2 + ax + b polinomu (x - 1) ve (x + 2) ile tam bölünüyorsa, a + b toplamı kaçtır?", options: ["-1", "0", "1", "2"], correctIndex: 2 },
        { category: "Matematik", text: "Analitik düzlemde A(-1, 2) ve B(3, 4) noktalarından geçen doğrunun eğimi kaçtır?", options: ["1/2", "2", "-1/2", "-2"], correctIndex: 0 },
        { category: "Matematik", text: "f(x) = x^2 - 4x + 5 parabolünün tepe noktasının koordinatları toplamı kaçtır?", options: ["1", "2", "3", "4"], correctIndex: 2 },
        { category: "Matematik", text: "Kökleri x1 ve x2 olan x^2 - 5x + 6 = 0 denklemi için (1/x1) + (1/x2) değeri kaçtır?", options: ["5/6", "6/5", "-5/6", "5"], correctIndex: 0 },
        { category: "Matematik", text: "sin(30°) + cos(60°) işleminin sonucu kaçtır?", options: ["1/2", "1", "kök(3)/2", "kök(3)"], correctIndex: 1 },
        { category: "Matematik", text: "A = {1, 2, 3, 4, 5} kümesinin 3 elemanlı alt kümelerinin kaç tanesinde '2' elemanı bulunur?", options: ["4", "6", "10", "12"], correctIndex: 1 },
        { category: "Matematik", text: "x^2 - y^2 = 24 ve x - y = 4 olduğuna göre, x * y çarpımı kaçtır?", options: ["5", "8", "12", "20"], correctIndex: 0 },
        { category: "Matematik", text: "Bir malın fiyatına önce %20 zam yapılıyor. Daha sonra zamlı fiyat üzerinden %20 indirim yapılıyor. Malın son fiyatındaki değişim durumu nedir?", options: ["Değişmez", "%4 artar", "%4 azalır", "%10 azalır"], correctIndex: 2 },
        { category: "Matematik", text: "z = 3 - 4i karmaşık sayısının modülü (orijine olan uzaklığı) kaçtır?", options: ["1", "5", "7", "25"], correctIndex: 1 },
        { category: "Matematik", text: "2^(x+1) = 16^(x-2) denklemini sağlayan x değeri kaçtır?", options: ["2", "3", "4", "5"], correctIndex: 1 },
        { category: "Matematik", text: "|2x - 3| < 7 eşitsizliğini sağlayan x tam sayılarının toplamı kaçtır?", options: ["5", "7", "9", "12"], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "Tüm A'lar B'dir. Hiçbir B, C değildir. Bu önermelere göre aşağıdakilerden hangisi kesinlikle doğrudur?", options: ["Bazı C'ler A'dır.", "Hiçbir A, C değildir.", "Tüm B'ler A'dır.", "Bazı A'lar C'dir."], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "Eğer yağmur yağarsa yerler ıslanır. Yerler ıslak değil. O halde:", options: ["Yağmur yağmıştır.", "Yağmur yağmamıştır.", "Güneş açmıştır.", "Sonuç çıkarılamaz."], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "2, 6, 12, 20, 30, ? dizisinde soru işareti yerine hangi sayı gelmelidir?", options: ["38", "40", "42", "44"], correctIndex: 2 },
        { category: "Mantık ve Veri", text: "Ali, Burak'tan uzun; Can, Ali'den kısadır. Bu durumda en kısa kişi kimdir?", options: ["Ali", "Burak", "Can", "Burak veya Can olabilir"], correctIndex: 3 },
        { category: "Mantık ve Veri", text: "Bir şifreleme sisteminde 'ELMA' kelimesi 'FNNB' olarak yazılıyorsa, 'KEDİ' kelimesi nasıl yazılır?", options: ["LFEJ", "LFJE", "MGEJ", "KFEJ"], correctIndex: 0 },
        { category: "Mantık ve Veri", text: "Bir satranç turnuvasında 5 oyuncu vardır. Herkes birbiriyle tam olarak bir kez maç yapacaktır. Toplam kaç maç oynanır?", options: ["10", "15", "20", "25"], correctIndex: 0 },
        { category: "Mantık ve Veri", text: "Aşağıdaki kelimelerden hangisi anlamsal olarak diğerlerinden farklıdır?", options: ["Keman", "Gitar", "Piyano", "Flüt"], correctIndex: 3 },
        { category: "Mantık ve Veri", text: "Bir işi 4 işçi 15 günde bitirebiliyorsa, aynı işi 6 işçi kaç günde bitirir?", options: ["8", "10", "12", "15"], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "Bugün günlerden Salı ise, 100 gün sonra hangi gün olur?", options: ["Pazartesi", "Çarşamba", "Perşembe", "Cuma"], correctIndex: 2 },
        { category: "Mantık ve Veri", text: "Bir kitaplıktaki kitapların %40'ı roman, %30'u şiir, kalanı ise tarih kitabıdır. Tarih kitapları 60 adet ise toplam kaç kitap vardır?", options: ["150", "200", "250", "300"], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "'X olmazsa Y gerçekleşmez.' cümlesi mantıksal olarak aşağıdakilerden hangisine denktir?", options: ["Y gerçekleşmişse X olmuştur.", "X olursa Y kesin gerçekleşir.", "Y olmazsa X de olmaz.", "X ve Y birbirine bağlı değildir."], correctIndex: 0 },
        { category: "Mantık ve Veri", text: "1, 4, 9, 16, 25 sayıları hangi kurala göre dizilmiştir?", options: ["Asal sayılar", "Fibonacci dizisi", "Tam kare sayılar", "Çift sayılar"], correctIndex: 2 },
        { category: "Mantık ve Veri", text: "Ahmet doğduğunda Ayşe 5 yaşındaydı. Ahmet 10 yaşına geldiğinde yaşları toplamı kaç olur?", options: ["15", "20", "25", "30"], correctIndex: 2 },
        { category: "Mantık ve Veri", text: "Zıt anlamlılık ilişkisi bakımından 'İleri - Geri' eşleşmesine benzeyen hangisidir?", options: ["Ağır - Yavaş", "Taze - Bayat", "Güzel - Çirkin", "Uzak - Yakın"], correctIndex: 1 },
        { category: "Mantık ve Veri", text: "Bir saat her 24 saatte 5 dakika geri kalmaktadır. Ayarlandıktan 4 gün sonra doğru saat 12:00'yi gösterdiğinde bozuk saat kaçı gösterir?", options: ["11:40", "11:45", "12:15", "12:20"], correctIndex: 0 },
        { category: "Fizik", text: "Durgun halden 2 m/s^2 sabit ivmeyle harekete başlayan bir araç, 5 saniye sonra kaç metre yol almış olur?", options: ["10 m", "20 m", "25 m", "50 m"], correctIndex: 2 },
        { category: "Fizik", text: "Yerden h yüksekliğinden serbest bırakılan bir cisim yere v hızıyla çarpıyor. Cisim 4h yüksekliğinden serbest bırakılsaydı yere çarpma hızı ne olurdu? (Hava sürtünmesi önemsizdir)", options: ["v", "2v", "4v", "16v"], correctIndex: 1 },
        { category: "Fizik", text: "Dirençleri sırasıyla 4 Ohm ve 12 Ohm olan iki iletken paralel bağlanmıştır. Sistemin eşdeğer direnci kaç Ohm'dur?", options: ["3", "8", "16", "48"], correctIndex: 0 },
        { category: "Fizik", text: "Bir cisme uygulanan net kuvvetin cismin ivmesine oranı aşağıdakilerden hangisini verir?", options: ["Kütle", "Hız", "İş", "Güç"], correctIndex: 0 },
        { category: "Fizik", text: "Işığın saydam bir ortamdan başka bir saydam ortama geçerken doğrultu değiştirmesine ne ad verilir?", options: ["Yansıma", "Kırılma", "Girişim", "Kırınım"], correctIndex: 1 },
        { category: "Kimya", text: "Normal koşullarda 1 mol ideal gaz kaç litre hacim kaplar?", options: ["11.2", "22.4", "24.5", "44.8"], correctIndex: 1 },
        { category: "Kimya", text: "Atom numarası 11 olan Sodyum (Na) elementi periyodik tablonun neresinde bulunur?", options: ["1. Periyot 1A", "2. Periyot 2A", "3. Periyot 1A", "3. Periyot 2A"], correctIndex: 2 },
        { category: "Kimya", text: "pH değeri 3 olan bir sulu çözelti için aşağıdakilerden hangisi doğrudur?", options: ["Kuvvetli bazdır", "Zayıf bazdır", "Asidiktir", "Nötrdür"], correctIndex: 2 },
        { category: "Kimya", text: "CO2 bileşiğindeki Karbon (C) atomunun yükseltgenme basamağı kaçtır? (Oksijen genellikle -2 alır)", options: ["-4", "-2", "+2", "+4"], correctIndex: 3 },
        { category: "Kimya", text: "Kütle numarası 35, atom numarası 17 olan elementin nötron sayısı kaçtır?", options: ["17", "18", "35", "52"], correctIndex: 1 },
        { category: "Kimya", text: "Metan (CH4) molekülünde karbon ve hidrojen atomları arasındaki bağın türü nedir?", options: ["İyonik bağ", "Apolar kovalent bağ", "Polar kovalent bağ", "Hidrojen bağı"], correctIndex: 2 },
        { category: "Kimya", text: "Aşağıdakilerden hangisi soygaz değildir?", options: ["Helyum", "Neon", "Argon", "Klor"], correctIndex: 3 },
        { category: "Kimya", text: "1 mol H2O molekülünde toplam kaç mol atom bulunur?", options: ["1", "2", "3", "6"], correctIndex: 2 },
        { category: "Kimya", text: "Tuz ruhu olarak bilinen asidin kimyasal formülü nedir?", options: ["H2SO4", "HNO3", "HCl", "CH3COOH"], correctIndex: 2 },
        { category: "Kimya", text: "Kimyasal bir reaksiyonda tepkime hızını artıran ancak kendisi harcanmayan maddeye ne denir?", options: ["Reaktif", "Katalizör", "Ürün", "İnhibitör"], correctIndex: 1 },
        { category: "Biyoloji", text: "Hücrede enerji (ATP) üretiminden sorumlu organel aşağıdakilerden hangisidir?", options: ["Ribozom", "Lizozom", "Mitokondri", "Golgi aygıtı"], correctIndex: 2 },
        { category: "Biyoloji", text: "Bitkilerde fotosentez işlemi hücrenin hangi bölümünde gerçekleşir?", options: ["Kloroplast", "Kromoplast", "Lökoplast", "Sentrozom"], correctIndex: 0 },
        { category: "Biyoloji", text: "İnsanda kanın pıhtılaşmasında görev alan kan hücreleri hangileridir?", options: ["Eritrositler (Alyuvarlar)", "Lökositler (Akyuvarlar)", "Trombositler (Kan pulcukları)", "Nöronlar"], correctIndex: 2 },
        { category: "Biyoloji", text: "Mitoz bölünme sonucunda ana hücreden kaç adet yavru hücre oluşur?", options: ["2", "4", "6", "8"], correctIndex: 0 },
        { category: "Biyoloji", text: "DNA'nın yapısında bulunan organik bazlardan hangisi RNA'da bulunmaz?", options: ["Adenin", "Guanin", "Sitozin", "Timin"], correctIndex: 3 },
        { category: "Biyoloji", text: "Kan şekerini düşüren hormon pankreasın hangi hücreleri tarafından üretilir?", options: ["Alfa hücreleri", "Beta hücreleri", "Mide bezleri", "Karaciğer hücreleri"], correctIndex: 1 },
        { category: "Biyoloji", text: "Memeliler sınıfına ait canlıların kalbi kaç odacıktan oluşur?", options: ["2", "3", "4", "5"], correctIndex: 2 },
        { category: "Biyoloji", text: "Proteinlerin yapı taşları aşağıdakilerden hangisidir?", options: ["Glikoz", "Yağ asitleri", "Amino asitler", "Nükleotitler"], correctIndex: 2 },
        { category: "Biyoloji", text: "Aşağıdaki hastalıklardan hangisine virüsler neden olur?", options: ["Verem", "Tifo", "Grip", "Sıtma"], correctIndex: 2 },
        { category: "Biyoloji", text: "Mendel genetiğine göre, heterozigot (Aa) iki bireyin çaprazlanması sonucu oluşan nesilde fenotip ayrışım oranı nedir?", options: ["1:1", "3:1", "1:2:1", "9:3:3:1"], correctIndex: 1 }
    ];

    // Toplam Sınav Süresi (Saniye cinsinden: 110 dakika)
    let timeLeft = 110 * 60; 
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timerInterval;

    // Başlangıç Kurulumu
    function init() {
        buildNavigation();
        loadQuestion(0);
        startTimer();
    }

    // Navigasyon Butonlarını Oluştur
    function buildNavigation() {
        const navContainer = document.getElementById('question-nav');
        navContainer.innerHTML = '';
        questions.forEach((q, index) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = index + 1;
            btn.onclick = () => loadQuestion(index);
            btn.id = `nav-btn-${index}`;
            navContainer.appendChild(btn);
        });
    }

    // Soruyu Ekrana Yükle
    function loadQuestion(index) {
        currentQuestionIndex = index;
        const q = questions[index];
        
        document.getElementById('q-category').innerText = q.category;
        document.getElementById('q-text').innerHTML = q.text;
        
        const optionsContainer = document.getElementById('q-options');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'option';
            radio.value = optIndex;
            
            // Eğer daha önce işaretlenmişse seçili getir
            if(userAnswers[index] === optIndex) {
                radio.checked = true;
            }
            
            radio.onchange = () => saveAnswer(optIndex);
            
            label.appendChild(radio);
            const span = document.createElement('span');
            span.innerHTML = opt;
            label.appendChild(span);
            
            optionsContainer.appendChild(label);
        });

        updateNavUI();
        
        // MathJax'i yeni yüklenen soru için tetikle
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    // Cevabı Kaydet ve UI Güncelle
    function saveAnswer(optIndex) {
        userAnswers[currentQuestionIndex] = optIndex;
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('answered');
    }

    function updateNavUI() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`nav-btn-${currentQuestionIndex}`).classList.add('active');
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) loadQuestion(currentQuestionIndex + 1);
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
    }

    // Zamanlayıcı
    function startTimer() {
        const timerBox = document.getElementById('timer-box');
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerBox.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishExam();
            }
        }, 1000);
    }

    // Sınavı Bitir ve Puanı Hesapla
    function finishExam() {
        if(timeLeft > 0 && !confirm("Sınavı bitirmek istediğinize emin misiniz?")) return;
        
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        let correct = 0;
        let wrong = 0;
        let empty = 0;

        userAnswers.forEach((ans, index) => {
            if (ans === null) {
                empty++;
            } else if (ans === questions[index].correctIndex) {
                correct++;
            } else {
                wrong++;
            }
        });

        // CEnT-S Puanlama Sistemi (+1 doğru, -0.25 yanlış)
        let netScore = correct - (wrong * 0.25);

        document.getElementById('final-score').innerText = netScore.toFixed(2);
        document.getElementById('res-correct').innerText = correct;
        document.getElementById('res-wrong').innerText = wrong;
        document.getElementById('res-empty').innerText = empty;
    }

    // Başlat
    window.onload = init;
</script>
</body>
</html>
